{% extends 'layout.html' %} {% block content %}
<h1>Login</h1>
<form action="/" method="post" class="box">
  <div class="input__wrapper">
    <input
      type="text"
      name="username"
      id="username"
      placeholder="Username"
      class="input__field"
      required
    />
  </div>
  <div class="input__wrapper">
    <input
      type="password"
      name="password"
      id="password"
      placeholder="Password"
      class="input__field"
      required
    />
  </div>
  <div class="input__wrapper">
    <!-- Hidden CSRF token field submitted with the form for server side verification -->
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <input type="submit" class="btn" value="Log In" />
  </div>
</form>
<!-- User message -->
{% if msg %}
<!--Removing the "| safe" let's html know that the text is not deemed safe and consider it face value rather than as a potential executable-->
<div>{{ msg }}</div>
{% endif %}
{% endblock %}
